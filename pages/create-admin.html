<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Admin - Prime Home Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }
        
        .container h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #764ba2;
        }
        
        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            display: none;
        }
        
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .credentials {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 5px;
            padding: 15px;
            margin-top: 15px;
            font-size: 13px;
            font-family: monospace;
        }
        
        .credentials-item {
            margin-bottom: 10px;
        }
        
        .credentials-item strong {
            color: #667eea;
        }
        
        .warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛠️ Create Admin Account</h1>
        <p class="subtitle">Prime Home Hub - Setup Admin User</p>
        
        <div class="warning">
            <strong>⚠️ Security Notice:</strong> Change the password after first login. Use a strong password with numbers, letters, and symbols.
        </div>
        
        <form id="adminForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" value="admin" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" value="admin@primehomehub.com" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" value="Admin@123456" required>
            </div>
            
            <div class="form-group">
                <label for="firstName">First Name</label>
                <input type="text" id="firstName" name="firstName" value="Admin" required>
            </div>
            
            <div class="form-group">
                <label for="lastName">Last Name</label>
                <input type="text" id="lastName" name="lastName" value="User" required>
            </div>
            
            <button type="submit">Create Admin Account</button>
        </form>
        
        <div id="message" class="message"></div>
    </div>

    <script>
        document.getElementById('adminForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = {
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                first_name: document.getElementById('firstName').value,
                last_name: document.getElementById('lastName').value
            };
            
            try {
                const response = await fetch('api/users.php?action=create-admin', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });
                
                const data = await response.json();
                const messageDiv = document.getElementById('message');
                
                if (data.success) {
                    messageDiv.className = 'message success';
                    messageDiv.innerHTML = `
                        <strong>✓ Admin Created Successfully!</strong>
                        <div class="credentials">
                            <div class="credentials-item">
                                <strong>Admin ID:</strong> ${data.admin_id}
                            </div>
                            <div class="credentials-item">
                                <strong>Username:</strong> ${formData.username}
                            </div>
                            <div class="credentials-item">
                                <strong>Email:</strong> ${formData.email}
                            </div>
                            <div class="credentials-item">
                                <strong>Password:</strong> ${formData.password}
                            </div>
                            <div class="credentials-item">
                                <strong>Role:</strong> admin
                            </div>
                        </div>
                        <p style="margin-top: 15px; font-style: italic;">
                            ⚠️ Important: Change the password immediately after first login!
                        </p>
                    `;
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.innerHTML = `<strong>Error:</strong> ${data.message || 'Failed to create admin'}`;
                }
                messageDiv.style.display = 'block';
            } catch (error) {
                const messageDiv = document.getElementById('message');
                messageDiv.className = 'message error';
                messageDiv.innerHTML = `<strong>Error:</strong> ${error.message}`;
                messageDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
