<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Prime Home Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="../index.html"><i class="bi bi-palette-fill"></i> Prime Home Hub</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="../index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="shop.html">Shop</a></li>
                    <li class="nav-item"><a class="nav-link active" href="cart.html">Cart</a></li>
                    <li class="nav-item">
                        <a class="nav-link position-relative" href="cart.html">
                            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="cart-badge">0</span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Header -->
    <section class="bg-light py-4">
        <div class="container">
            <h1 class="display-4">Shopping Cart</h1>
        </div>
    </section>

    <!-- Cart Content -->
    <section class="py-5">
        <div class="container">
            <div class="row g-4">
                <!-- Cart Items -->
                <div class="col-lg-8">
                    <div id="cart-items-container">
                        <!-- Cart items will be loaded here -->
                    </div>
                </div>

                <!-- Cart Summary -->
                <div class="col-lg-4">
                    <div class="cart-summary">
                        <h5 class="mb-3">Order Summary</h5>
                        <div class="cart-summary-row">
                            <span>Subtotal:</span>
                            <span id="subtotal">$0.00</span>
                        </div>
                        <div class="cart-summary-row">
                            <span>Shipping:</span>
                            <span id="shipping">$0.00</span>
                        </div>
                        <div class="cart-summary-row">
                            <span>Tax:</span>
                            <span id="tax">$0.00</span>
                        </div>
                        <div class="cart-summary-row total">
                            <span>Total:</span>
                            <span id="total">$0.00</span>
                        </div>
                        <button class="btn btn-primary btn-lg w-100 mb-2" id="checkout-btn">Proceed to Checkout</button>
                        <a href="shop.html" class="btn btn-outline-secondary btn-lg w-100">Continue Shopping</a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-dark text-light py-5 mt-5">
        <div class="container text-center">
            <p>&copy; 2026 Prime Home Hub. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            displayCart();
            document.getElementById('checkout-btn').addEventListener('click', function() {
                if (cart.items.length === 0) {
                    alert('Your cart is empty');
                    return;
                }

                if (!userManager.isLoggedIn()) {
                    alert('Please login to checkout');
                    return;
                }

                // Create order
                const total = cart.getTotal();
                const order = orderManager.createOrder(cart.items, total, userManager.currentUser.id);

                // Placeholder for payment processing
                alert(`Order #${order.id.toString().slice(0, 8)} created successfully!\n\nTotal: $${total.toFixed(2)}\n\nPayment integration (Stripe/PayPal) goes here`);

                // Clear cart after order
                cart.clear();
                displayCart();

                // Redirect to user dashboard
                setTimeout(() => {
                    window.location.href = 'user-dashboard.html';
                }, 1500);
            });
        });

        function displayCart() {
            const container = document.getElementById('cart-items-container');
            container.innerHTML = '';

            if (cart.items.length === 0) {
                container.innerHTML = '<div class="alert alert-info">Your cart is empty. <a href="shop.html">Continue shopping</a></div>';
                updateSummary();
                return;
            }

            cart.items.forEach(item => {
                const cartItem = document.createElement('div');
                cartItem.className = 'cart-item d-flex gap-3 align-items-center';
                cartItem.innerHTML = `
                    <img src="${item.image}" alt="${item.name}" style="width:120px; height:120px; object-fit:cover; border-radius:8px;">
                    <div class="flex-grow-1">
                        <h6 class="mb-1">${item.name}</h6>
                        <p class="text-muted mb-0">$${item.price}</p>
                    </div>
                    <div class="text-center">
                        <input type="number" class="form-control form-control-sm mb-2" value="${item.quantity}" min="1" max="10" 
                               onchange="updateCartQuantity(${item.id}, this.value)">
                        <small>$${(item.price * item.quantity).toFixed(2)}</small>
                    </div>
                    <button class="btn btn-sm btn-danger" onclick="removeFromCart(${item.id})">
                        <i class="bi bi-trash"></i>
                    </button>
                `;
                container.appendChild(cartItem);
            });

            updateSummary();
        }

        function updateCartQuantity(productId, quantity) {
            cart.updateQuantity(productId, parseInt(quantity));
            displayCart();
        }

        function removeFromCart(productId) {
            cart.removeItem(productId);
            displayCart();
        }

        function updateSummary() {
            const subtotal = cart.getTotal();
            const shipping = cart.items.length > 0 ? 10 : 0;
            const tax = subtotal * 0.08;
            const total = subtotal + shipping + tax;

            document.getElementById('subtotal').textContent = `$${subtotal.toFixed(2)}`;
            document.getElementById('shipping').textContent = `$${shipping.toFixed(2)}`;
            document.getElementById('tax').textContent = `$${tax.toFixed(2)}`;
            document.getElementById('total').textContent = `$${total.toFixed(2)}`;
        }
    </script>
</body>
</html>
