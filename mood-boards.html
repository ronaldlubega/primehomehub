<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood Boards - Prime Home Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.0/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* MOOD BOARDS STYLES */
        .mood-boards-container {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 2rem;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
        }

        .boards-sidebar {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            height: fit-content;
            position: sticky;
            top: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .boards-sidebar h5 {
            margin-bottom: 1rem;
            font-weight: 600;
            color: #333;
        }

        .new-board-btn {
            width: 100%;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .new-board-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        #boardsList {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            max-height: 500px;
            overflow-y: auto;
        }

        .board-item {
            padding: 0.75rem;
            border: 2px solid #eee;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
        }

        .board-item:hover {
            border-color: #667eea;
            background: #667eea05;
        }

        .board-item.active {
            border-color: #667eea;
            background: #667eea15;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.2);
        }

        .board-item h6 {
            margin: 0;
            font-size: 0.95rem;
            font-weight: 600;
            color: #333;
        }

        .board-item small {
            display: flex;
            justify-content: space-between;
            margin-top: 0.5rem;
            color: #999;
            font-size: 0.8rem;
        }

        .editor-container {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 2px solid #eee;
        }

        .board-title {
            flex: 1;
        }

        .board-title h2 {
            margin: 0;
            color: #333;
            font-weight: 700;
        }

        .board-title p {
            margin: 0.5rem 0 0;
            color: #999;
            font-size: 0.9rem;
        }

        .editor-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .action-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: white;
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .add-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
        }

        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .style-section, .color-section {
            margin-bottom: 2rem;
        }

        .section-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: #666;
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        #styleTags, #colorTags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .style-tag {
            padding: 0.5rem 1rem;
            border: 2px solid #ddd;
            border-radius: 20px;
            background: white;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            color: #666;
            transition: all 0.2s;
        }

        .style-tag:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .style-tag.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }

        .color-tag {
            padding: 0.5rem 0.75rem;
            border: 2px solid;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            background-size: 100% 100%;
            transition: all 0.2s;
            display: flex;
            align-items: center;
        }

        .color-tag:hover {
            transform: scale(1.05);
        }

        #moodGrid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .mood-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: 12px;
            overflow: hidden;
            background: #f8f9fa;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: all 0.2s;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mood-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15);
        }

        .mood-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .mood-item-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .mood-item:hover .mood-item-overlay {
            opacity: 1;
        }

        .mood-item-overlay button {
            background: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            color: #667eea;
            transition: all 0.2s;
        }

        .mood-item-overlay button:hover {
            background: #667eea;
            color: white;
        }

        #emptyState {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 400px;
            text-align: center;
            color: #999;
        }

        #emptyState svg {
            width: 120px;
            height: 120px;
            margin-bottom: 1rem;
            opacity: 0.3;
        }

        /* MODALS */
        .modal-content {
            border-radius: 12px;
            border: none;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
        }

        .modal-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
        }

        .modal-title {
            font-weight: 600;
        }

        .btn-close-white {
            filter: brightness(0) invert(1);
        }

        #productSelector {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1rem;
            max-height: 400px;
            overflow-y: auto;
        }

        .selector-product {
            padding: 1rem;
            border: 2px solid #eee;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .selector-product:hover {
            border-color: #667eea;
            background: #667eea05;
            transform: translateY(-2px);
        }

        .selector-product img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 4px;
            margin-bottom: 0.5rem;
        }

        .selector-product-info h6 {
            margin: 0.5rem 0;
            font-size: 0.85rem;
            color: #333;
        }

        .selector-product-info p {
            margin: 0.25rem 0;
            font-size: 0.75rem;
            color: #999;
        }

        .selector-product-info .price {
            color: #667eea;
            font-weight: 600;
        }

        .color-picker-input {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        input[type="color"] {
            width: 60px;
            height: 60px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        input[type="text"].color-input {
            flex: 1;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.9rem;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .mood-boards-container {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            .boards-sidebar {
                position: static;
                max-height: 200px;
            }

            #boardsList {
                max-height: 150px;
            }

            #moodGrid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }

            .editor-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .editor-actions {
                width: 100%;
            }

            .action-btn {
                flex: 1;
                justify-content: center;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <!-- NAVIGATION -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="bi bi-palette"></i> Prime Home Hub
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="shop.html">Shop</a></li>
                    <li class="nav-item"><a class="nav-link" href="visualizer.html">Visualizer</a></li>
                    <li class="nav-item"><a class="nav-link active" href="mood-boards.html">Mood Boards</a></li>
                    <li class="nav-item"><a class="nav-link" href="room-planner.html">Room Planner</a></li>
                </ul>
                <ul class="navbar-nav ms-3">
                    <li class="nav-item">
                        <a class="nav-link" href="cart.html">
                            <i class="bi bi-cart"></i> <span id="cartBadge" class="badge bg-danger">0</span>
                        </a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                            <i class="bi bi-person"></i>
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#" id="userButton">Login</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- MAIN CONTENT -->
    <div class="container-fluid py-4">
        <div class="mood-boards-container">
            <!-- SIDEBAR -->
            <div class="boards-sidebar">
                <h5><i class="bi bi-bookmark"></i> Collections</h5>
                <button id="newBoardBtn" class="new-board-btn">
                    <i class="bi bi-plus"></i> New Board
                </button>
                <div id="boardsList"></div>
            </div>

            <!-- EDITOR -->
            <div class="editor-container">
                <div id="emptyState">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M2 2a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v13.5a.5.5 0 0 1-.777.416L8 13.71l-5.223 2.206A.5.5 0 0 1 2 15.5V2zm2-1a1 1 0 0 0-1 1v12.566l4.723-2.482a.5.5 0 0 1 .554 0L13 14.566V2a1 1 0 0 0-1-1H4z"/>
                    </svg>
                    <h4>No Board Selected</h4>
                    <p>Create a new mood board to get started</p>
                    <button id="newBoardBtn2" class="btn btn-primary mt-3">
                        <i class="bi bi-plus"></i> Create First Board
                    </button>
                </div>

                <div id="editor" style="display: none;">
                    <!-- EDITOR HEADER -->
                    <div class="editor-header">
                        <div class="board-title">
                            <h2 id="currentBoardName">Untitled Board</h2>
                            <p id="boardInfo"></p>
                        </div>
                        <div class="editor-actions">
                            <button id="addProductBtn" class="action-btn add-btn">
                                <i class="bi bi-plus"></i> Product
                            </button>
                            <button id="addColorBtn" class="action-btn add-btn">
                                <i class="bi bi-palette"></i> Color
                            </button>
                            <button id="addTextBtn" class="action-btn add-btn">
                                <i class="bi bi-type"></i> Text
                            </button>
                            <button id="shareBtn" class="action-btn">
                                <i class="bi bi-share"></i> Share
                            </button>
                            <button id="downloadBoardBtn" class="action-btn">
                                <i class="bi bi-download"></i> Export
                            </button>
                            <button id="renameBoardBtn" class="action-btn">
                                <i class="bi bi-pencil"></i> Rename
                            </button>
                            <button id="deleteBoardBtn" class="action-btn" style="color: #dc3545;">
                                <i class="bi bi-trash"></i> Delete
                            </button>
                        </div>
                    </div>

                    <!-- STYLE SECTION -->
                    <div class="style-section">
                        <div class="section-title">Design Styles</div>
                        <div id="styleTags"></div>
                    </div>

                    <!-- COLOR PALETTE SECTION -->
                    <div class="color-section">
                        <div class="section-title">Color Palette</div>
                        <div id="colorTags"></div>
                    </div>

                    <!-- MOOD GRID -->
                    <div>
                        <div class="section-title">Mood Board</div>
                        <div id="moodGrid"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- PRODUCT SELECTOR MODAL -->
    <div class="modal fade" id="productSelectorModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Select Products</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="productSelector"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- COLOR PICKER MODAL -->
    <div class="modal fade" id="colorPickerModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add Color</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="color-picker-input">
                        <input type="color" id="colorInput" value="#667eea">
                        <input type="text" id="colorName" class="color-input" placeholder="Color name (optional)">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" id="addColorConfirmBtn" class="btn btn-primary">Add Color</button>
                </div>
            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/products.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/mood-boards.js"></script>
</body>
