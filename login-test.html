<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Test - Prime Home Hub</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 2rem;
        }
        .login-container {
            background: white;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 100%;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 2rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #555;
            font-weight: 600;
        }
        input {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .alert {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
        }
        .alert.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .alert.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .credentials {
            background: #f8f9fa;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }
        .credentials h4 {
            margin: 0 0 0.5rem 0;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>🔐 Admin Login Test</h2>
        
        <div class="credentials">
            <h4>Test Credentials:</h4>
            <strong>Email:</strong> admin@primehomehub.com<br>
            <strong>Password:</strong> Admin@123456
        </div>

        <div id="alert" class="alert"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" value="admin@primehomehub.com" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" value="Admin@123456" required>
            </div>
            
            <button type="submit" class="btn" id="loginBtn">Login</button>
        </form>

        <div style="margin-top: 2rem; text-align: center;">
            <a href="index.html" style="color: #667eea; text-decoration: none;">← Back to Website</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const alert = document.getElementById('alert');
            const loginBtn = document.getElementById('loginBtn');
            
            // Get form data
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Show loading
            loginBtn.disabled = true;
            loginBtn.textContent = 'Logging in...';
            alert.style.display = 'none';
            
            try {
                // Make login request
                const response = await fetch('api/users-debug.php?action=login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: email,
                        password: password
                    })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    // Success
                    alert.className = 'alert success';
                    alert.textContent = '✅ Login successful! Redirecting to admin dashboard...';
                    alert.style.display = 'block';
                    
                    // Store user data
                    localStorage.setItem('currentUser', JSON.stringify(data.user));
                    localStorage.setItem('authToken', data.token);
                    
                    // Redirect after 2 seconds
                    setTimeout(() => {
                        window.location.href = 'pages/admin-dashboard.html';
                    }, 2000);
                    
                } else {
                    // Error
                    alert.className = 'alert error';
                    alert.textContent = '❌ ' + (data.error || 'Login failed');
                    alert.style.display = 'block';
                }
                
            } catch (error) {
                alert.className = 'alert error';
                alert.textContent = '❌ Network error: ' + error.message;
                alert.style.display = 'block';
            }
            
            // Reset button
            loginBtn.disabled = false;
            loginBtn.textContent = 'Login';
        });
    </script>
</body>
</html>
